<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e8ff00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="101Train" />
  <title>101トレーニング</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      background: #0f0f0f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
      padding-bottom: 80px;
    }

    /* ===== LAYOUT ===== */
    .screen { display: none; padding: 16px 16px 8px; max-width: 640px; margin: 0 auto; }
    .screen.active { display: block; }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
      display: flex;
      z-index: 1000;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      min-height: 48px;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn .nav-icon { font-size: 22px; line-height: 1; }
    .nav-btn .nav-label { font-size: 11px; font-weight: 500; }
    .nav-btn.active { color: #e8ff00; }

    /* ===== CARDS ===== */
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 13px;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    /* ===== TYPOGRAPHY ===== */
    h1 { font-size: 24px; font-weight: 700; }
    h2 { font-size: 20px; font-weight: 700; }
    h3 { font-size: 17px; font-weight: 600; }
    .text-accent { color: #e8ff00; }
    .text-muted { color: #888; }
    .text-warning { color: #ff4444; }
    .text-sm { font-size: 14px; }
    .text-xs { font-size: 12px; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-primary {
      background: #e8ff00;
      color: #0f0f0f;
      width: 100%;
    }
    .btn-secondary {
      background: #2a2a2a;
      color: #fff;
      width: 100%;
    }
    .btn-success {
      background: #00c853;
      color: #fff;
    }
    .btn-danger {
      background: #ff4444;
      color: #fff;
    }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #333;
      color: #ccc;
    }
    .btn-sm {
      padding: 8px 14px;
      font-size: 14px;
      min-height: 36px;
    }
    .btn-icon {
      padding: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #2a2a2a;
      font-size: 18px;
    }

    /* ===== VIDEO BUTTON ===== */
    .btn-video {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(255,0,0,0.10);
      border: 1px solid rgba(255,80,80,0.30);
      color: #ff5555;
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
      text-decoration: none;
      min-height: 26px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .btn-video:active { background: rgba(255,0,0,0.22); }

    /* ===== BADGES ===== */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-chest    { background: #ff6b35; color: #fff; }
    .badge-back     { background: #4285f4; color: #fff; }
    .badge-legs     { background: #00c853; color: #fff; }
    .badge-shoulders{ background: #9c27b0; color: #fff; }
    .badge-biceps   { background: #ff9800; color: #fff; }
    .badge-triceps  { background: #00bcd4; color: #fff; }
    .badge-core    { background: #203040; color: #80cfff; }

    /* ===== FORM ELEMENTS ===== */
    input[type="number"], input[type="text"] {
      background: #252525;
      border: 1.5px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      padding: 10px 12px;
      text-align: center;
      min-height: 48px;
      width: 100%;
      font-family: inherit;
      -webkit-appearance: none;
    }
    input[type="number"]:focus, input[type="text"]:focus {
      outline: none;
      border-color: #e8ff00;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { opacity: 0; }

    /* ===== DIVIDER ===== */
    .divider { height: 1px; background: #2a2a2a; margin: 12px 0; }

    /* ===== FLEXBOX UTILS ===== */
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }
    .gap-16 { gap: 16px; }
    .flex-1 { flex: 1; }
    .w-full { width: 100%; }

    /* ===== SPACING ===== */
    .mt-4 { margin-top: 4px; }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .mb-4 { margin-bottom: 4px; }
    .mb-8 { margin-bottom: 8px; }
    .mb-12 { margin-bottom: 12px; }

    /* ===== PAGE HEADER ===== */
    .page-header { margin-bottom: 20px; }
    .page-header .greeting { font-size: 14px; color: #888; margin-bottom: 4px; }
    .page-header .date-str { font-size: 28px; font-weight: 800; color: #e8ff00; line-height: 1.1; }

    /* ===== HOME TAB ===== */
    .weekly-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .weekly-cell {
      background: #252525;
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }
    .weekly-cell .part-name { font-size: 13px; color: #aaa; margin-bottom: 4px; }
    .weekly-cell .set-count { font-size: 20px; font-weight: 800; }
    .weekly-cell .set-label { font-size: 11px; color: #666; }
    .weekly-cell.warn .set-count { color: #ff4444; }
    .weekly-cell.ok   .set-count { color: #e8ff00; }
    .weekly-cell.zero .set-count { color: #555; }

    .history-item {
      padding: 12px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item .hist-date { font-size: 13px; color: #888; }
    .history-item .hist-title { font-size: 16px; font-weight: 600; margin: 2px 0; }
    .history-item .hist-meta { font-size: 13px; color: #aaa; }

    /* ===== MENU TAB ===== */
    .split-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .split-btn {
      flex: 1;
      padding: 12px 8px;
      background: #252525;
      border: 2px solid #333;
      border-radius: 10px;
      color: #aaa;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      min-height: 48px;
      transition: all 0.2s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .split-btn.active {
      background: #e8ff001a;
      border-color: #e8ff00;
      color: #e8ff00;
    }

    .day-card {
      background: #1a1a1a;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .day-header .day-label {
      font-size: 18px;
      font-weight: 800;
      color: #e8ff00;
    }
    .day-header .day-parts {
      font-size: 14px;
      color: #aaa;
      flex: 1;
      margin-left: 12px;
    }
    .day-header .chevron { color: #666; font-size: 16px; transition: transform 0.2s; }
    .day-card.expanded .chevron { transform: rotate(180deg); }
    .day-body {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid #2a2a2a;
    }
    .day-card.expanded .day-body { display: block; }

    .exercise-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #222;
    }
    .exercise-row:last-of-type { border-bottom: none; }
    .exercise-row .ex-name { font-size: 15px; font-weight: 500; }
    .exercise-row .ex-meta { font-size: 12px; color: #666; margin-top: 2px; }

    /* ===== RECORD TAB ===== */
    .session-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .volume-display {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .volume-display .vol-label { font-size: 13px; color: #888; }
    .volume-display .vol-value { font-size: 24px; font-weight: 800; color: #e8ff00; }
    .volume-display .vol-unit { font-size: 13px; color: #888; }

    .set-warnings {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .set-warn-chip {
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      background: #ff44441a;
      color: #ff4444;
      border: 1px solid #ff444433;
    }

    .exercise-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .exercise-card .ex-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .exercise-card .ex-card-name { font-size: 17px; font-weight: 700; }
    .exercise-card .prev-weight {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }

    .set-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px;
      background: #252525;
      border-radius: 8px;
    }
    .set-row.completed {
      background: #00c85315;
      border: 1px solid #00c85330;
    }
    .set-num {
      font-size: 13px;
      color: #666;
      font-weight: 700;
      min-width: 34px;
      text-align: center;
    }
    .set-row .x-sep { color: #666; font-size: 15px; font-weight: 600; }
    .weight-input { width: 78px !important; min-width: 78px; }
    .rep-input { width: 60px !important; min-width: 60px; }
    .set-done-btn {
      min-width: 44px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #333;
      background: #252525;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .set-done-btn.done {
      background: #00c853;
      border-color: #00c853;
      color: #fff;
    }

    .add-set-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      width: 100%;
      background: #252525;
      border: 1.5px dashed #333;
      border-radius: 8px;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      margin-top: 4px;
      min-height: 40px;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .add-set-btn:active { opacity: 0.7; }

    .no-session {
      text-align: center;
      padding: 48px 24px;
    }
    .no-session .no-icon { font-size: 56px; margin-bottom: 16px; }
    .no-session p { color: #888; margin-bottom: 24px; font-size: 16px; line-height: 1.6; }

    /* ===== TIMER OVERLAY ===== */
    .timer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 2000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .timer-overlay.active { display: flex; }
    .timer-title { font-size: 18px; color: #888; font-weight: 600; }
    .timer-exercise { font-size: 16px; color: #aaa; text-align: center; padding: 0 24px; }

    .timer-ring-wrap {
      position: relative;
      width: 220px;
      height: 220px;
    }
    .timer-ring-wrap svg { transform: rotate(-90deg); }
    .timer-ring-bg { stroke: #2a2a2a; }
    .timer-ring-fg {
      stroke: #e8ff00;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }
    .timer-count {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .timer-seconds { font-size: 62px; font-weight: 900; color: #e8ff00; line-height: 1; }
    .timer-label { font-size: 14px; color: #888; margin-top: 4px; }

    .timer-controls { display: flex; gap: 12px; }
    .timer-duration-btns { display: flex; gap: 8px; }
    .timer-dur-btn {
      padding: 8px 16px;
      background: #252525;
      border: 1.5px solid #333;
      border-radius: 8px;
      color: #aaa;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .timer-dur-btn.active { border-color: #e8ff00; color: #e8ff00; background: #e8ff0012; }

    /* ===== ANALYSIS TAB ===== */
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 200px;
      margin-top: 8px;
    }
    canvas { border-radius: 8px; }

    .pr-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .pr-item:last-child { border-bottom: none; }
    .pr-item .pr-name { font-size: 15px; }
    .pr-item .pr-val { font-size: 15px; font-weight: 700; color: #e8ff00; }

    .freq-bar-wrap { margin-top: 4px; }
    /* ===== INTENSITY MODAL ===== */
    .intensity-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      align-items: flex-end;
      justify-content: center;
    }
    .intensity-modal.active { display: flex; }
    .intensity-sheet {
      background: #1a1a1a;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 640px;
    }
    .intensity-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .intensity-subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
    }
    .intensity-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
    .intensity-card {
      background: #252525;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .intensity-card.selected { background: #1e1e2a; }
    .intensity-card .ic-emoji { font-size: 28px; }
    .intensity-card .ic-body  { flex: 1; }
    .intensity-card .ic-label { font-size: 16px; font-weight: 700; }
    .intensity-card .ic-desc  { font-size: 13px; color: #888; margin-top: 2px; }
    .intensity-card .ic-rep   { font-size: 13px; font-weight: 600; margin-top: 4px; }
    .intensity-card .ic-weights { font-size: 12px; color: #666; margin-top: 3px; }

    /* ===== INTENSITY BADGE (記録タブ) ===== */
    .intensity-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    /* ===== CALENDAR ===== */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-month-label { font-size: 16px; font-weight: 700; }
    .cal-nav-btn {
      background: #252525;
      border: none;
      color: #fff;
      width: 36px; height: 36px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-day-label {
      text-align: center;
      font-size: 11px;
      color: #555;
      padding-bottom: 4px;
      font-weight: 600;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: #252525;
      color: #ccc;
      border: 1.5px solid transparent;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-day.today { border-color: #e8ff00; color: #e8ff00; }
    .cal-day.rest  { background: #3a1a1a; color: #ff4444; text-decoration: line-through; }
    .cal-day.trained { background: #1a2a1a; color: #4caf50; }
    .cal-day.trained.rest { background: #3a1a1a; color: #ff4444; }
    .cal-day.empty { background: none; cursor: default; }
    .cal-legend {
      display: flex; gap: 16px; margin-top: 10px;
      font-size: 12px; color: #888;
      flex-wrap: wrap;
    }
    .cal-legend span { display: flex; align-items: center; gap: 4px; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block;
    }
    .advice-box {
      background: #1a2030;
      border-left: 3px solid #e8ff00;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .advice-box .advice-title {
      font-size: 12px; color: #888; margin-bottom: 4px; font-weight: 600;
    }

    .freq-bar-row { margin-bottom: 8px; }
    .freq-bar-row .freq-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 4px;
    }
    .freq-bar-track {
      height: 8px;
      background: #252525;
      border-radius: 4px;
      overflow: hidden;
    }
    .freq-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: #e8ff00;
      transition: width 0.5s;
    }

    .session-hist-item {
      padding: 12px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .session-hist-item:last-child { border-bottom: none; }
    .session-hist-item .sh-date { font-size: 12px; color: #666; }
    .session-hist-item .sh-title { font-size: 15px; font-weight: 600; margin: 2px 0; }
    .session-hist-item .sh-meta { font-size: 13px; color: #888; }

    /* ===== ADD EXERCISE MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 1500;
      display: none;
      align-items: flex-end;
    }
    .modal-overlay.active { display: flex; }
    .modal-sheet {
      background: #1a1a1a;
      border-radius: 20px 20px 0 0;
      padding: 20px 16px 32px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-handle {
      width: 40px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .ex-select-list { display: flex; flex-direction: column; gap: 4px; }
    .ex-select-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 12px;
      background: #252525;
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;

  } catch(e) { return def; }
}
function save(key, val) {

// ============================================================

const DAYS_JP   = ['日','月','火','水','木','金','土'];
const MONTHS_JP = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}
function pad2(n) { return String(n).padStart(2,'0'); }

function formatDateJP(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return `${d.getFullYear()}年${MONTHS_JP[d.getMonth()]}${d.getDate()}日(${DAYS_JP[d.getDay()]})`;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 6)  return 'おはようございます 🌙';
  if (h < 12) return 'おはようございます ☀️';
  if (h < 18) return 'こんにちは 🌤️';
  return 'お疲れ様です 🌙';
}

function getWeekStart() {
  const d = new Date();
  const diff = d.getDate() - d.getDay();
  const s = new Date(d.getFullYear(), d.getMonth(), diff);
  return `${s.getFullYear()}-${pad2(s.getMonth()+1)}-${pad2(s.getDate())}`;
}

function isThisWeek(dateStr) {
  return dateStr >= getWeekStart() && dateStr <= todayStr();
}

// ============================================================
//  REST DAYS (カレンダー休み管理)
// ============================================================

// ジムに行ける日（仕事・育児の休みの日）を管理
function getGymDays() { return load('t101_restdays', []); }
function saveGymDays(d) { save('t101_restdays', d); }

function toggleGymDay(dateStr) {
  const days = getGymDays();
  const idx  = days.indexOf(dateStr);
  if (idx >= 0) days.splice(idx, 1);
  else days.push(dateStr);
  saveGymDays(days);
}

function isGymDay(dateStr) { return getGymDays().includes(dateStr); }

// 今月のジムに行ける日数
function getAvailableDaysThisMonth() {
  const now   = new Date();
  const year  = now.getFullYear();
  const month = now.getMonth();
  // 今月の登録済みジム日数をそのまま返す
  return getGymDays().filter(d => d.startsWith(`${year}-${pad2(month+1)}`)).length;
}

// 今週のジムに行ける残り日数（登録済みの日のうち今日以降）
function getAvailableDaysThisWeek() {
  const start = getWeekStart();
  const end   = getWeekEnd();
  const today = todayStr();
  // 今週の登録済みジム日のうち、今日以降のもの
  return getGymDays().filter(d => d >= today && d <= end).length;
}

// 週末を取得（日曜）
function getWeekEnd() {
  const d = new Date(getWeekStart());
  d.setDate(d.getDate() + 6);
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}

// 部位ごとの推奨セット数（週のジム日数に応じて調整）
// 日数が少ない→1日あたりのセット数を増やして週のトータルボリュームを維持
function getRecommendedSetsForWeek() {
  const available = getAvailableDaysThisWeek();
  if (available === 0) return 6; // 未登録の場合はデフォルト
  if (available >= 3) return 6;
  if (available === 2) return 8;
  return 10;
}

// ボリューム提案メッセージ
function getVolumeAdvice() {
  const available = getAvailableDaysThisWeek();
  const focus     = USER_PROFILE.focus;
  const gymDays   = getGymDays();

  if (gymDays.length === 0) {
    return 'カレンダーにジムに行ける日をタップして登録すると、最適なボリュームを提案します📅';
  }
  if (available === 0) {
    return '今週のジム予定日はもう終わりです。来週に向けてしっかり回復しましょう💤';
  }
  if (available === 1) {
    return `今週ジムに行けるのはあと1日！${focus.join('・')}を優先し、10セット/部位の集中トレーニングで週のボリュームを確保しましょう💪`;
  }
  if (available === 2) {
    return `今週ジムに行けるのはあと2日！1日あたり8セット/部位を目安にボリュームを上げて週のトータルを維持しましょう🔥`;
  }
  return `今週ジムに行ける日があと${available}日あります。通常通り${MAX_SETS_PER_PART}セット/部位を目標に！`;
}

// ============================================================
//  WEEKLY STATS
// ============================================================

function getWeeklySetsPerPart() {
  const counts = {};
  Object.keys(BODY_PARTS).forEach(p => counts[p] = 0);
  getHistory().forEach(session => {
    if (!isThisWeek(session.date)) return;
    (session.exercises || []).forEach(ex => {
      const done = (ex.sets || []).filter(s => s.done).length;
      if (counts[ex.part] !== undefined) counts[ex.part] += done;
    });
  });
  return counts;
}

function getPrevData(exName, bilateral) {
  const history = getHistory();
  for (let i = history.length - 1; i >= 0; i--) {
    const session = history[i];
    const ex = (session.exercises || []).find(e => e.name === exName);
    if (ex) {
      if (bilateral || ex.bilateral) {
        const done = (ex.sets || []).filter(s => s.done && s.weightL);
        if (done.length > 0) {
          const last = done[done.length - 1];
          return { weight: last.weightL, reps: last.repsL, weightR: last.weightR, repsR: last.repsR, bilateral: true };
        }
      } else {
        const done = (ex.sets || []).filter(s => s.done && s.weight);
        if (done.length > 0) {
          const last = done[done.length - 1];
          return { weight: last.weight, reps: last.reps };
        }
      }
    }
  }
  return null;
}

function getPrevWeight(exName, bilateral) {
  const prev = getPrevData(exName, bilateral);
  if (!prev) return null;
  if (prev.bilateral) {
    return `前回: L ${prev.weight}kg×${prev.reps} / R ${prev.weightR||prev.weight}kg×${prev.repsR||prev.reps}`;
  }
  return `前回: ${prev.weight}kg × ${prev.reps}`;
}

function calcSessionVolume(session) {
  let total = 0;
  (session.exercises || []).forEach(ex => {
    (ex.sets || []).forEach(s => { total += setVolume(s, ex.bilateral); });
  });
  return Math.round(total);
}

function menuExercises(parts) {
  const list = [];

}

function loadMenuDay(split, dayIdx) {
  // まず強度選択モーダルを表示
  pendingMenuDay = { split, dayIdx };
  openIntensityModal();
}

function openIntensityModal() {
  // PRから各種目の目安重量を計算して表示
  const prs = getPRs();

  // 代表種目（ベンチプレスなど）の目安重量を表示
  const repKinds = Object.entries(INTENSITY_TYPES).map(([key, t]) => {
    // PRがあれば重量目安を計算（PR重量をざっくり1RMと仮定）
    const prEx  = prs['ベンチプレス'] || prs['スクワット'] || prs['デッドリフト'];
    const rm1   = prEx ? Math.round(prEx.weight / (1.0278 - 0.0278 * prEx.reps)) : null;
    const wEst  = rm1 ? Math.round(rm1 * t.pct / 2.5) * 2.5 : null;
    const wNote = wEst ? `<div class="ic-weights">目安: 約${wEst}kg（1RM推定${rm1}kgの${Math.round(t.pct*100)}%）</div>` : '';
    const intervalNote = `<div class="ic-weights" style="color:${t.color};opacity:0.8;">⏱ インターバル: ${t.intervalLabel}推奨</div>`;
    const isSelected = key === selectedIntensity;
    return `
      <div class="intensity-card ${isSelected ? 'selected' : ''}"
           style="border-color:${isSelected ? t.color : 'transparent'};"
           onclick="selectIntensity('${key}')">
        <div class="ic-emoji">${t.emoji}</div>
        <div class="ic-body">
          <div class="ic-label" style="color:${t.color};">${t.label}</div>
          <div class="ic-desc">${t.desc}</div>
          <div class="ic-rep" style="color:${t.color};">${t.repRange}</div>
          ${wNote}
          ${intervalNote}
        </div>
      </div>`;
  }).join('');

  document.getElementById('intensityCards').innerHTML = repKinds;
  document.getElementById('intensityModal').classList.add('active');
}

function selectIntensity(key) {
  selectedIntensity = key;
  openIntensityModal(); // 再描画（選択状態更新）
}

function closeIntensityModal() {
  document.getElementById('intensityModal').classList.remove('active');
  pendingMenuDay = null;
}

function confirmIntensity() {
  if (!pendingMenuDay) return;
  const { split, dayIdx } = pendingMenuDay;
  const day  = SPLIT_PATTERNS[split][dayIdx];
  const t    = INTENSITY_TYPES[selectedIntensity];
  const name = `${t.emoji} Day ${day.label} — ${day.parts.map(p => BODY_PARTS[p].label).join('+')}`;
  activeSession = {
    id:        Date.now().toString(),
    name:      name,
    date:      todayStr(),
    startTime: Date.now(),
    intensity: selectedIntensity,
    exercises: buildExercises(day.parts)
  };
  saveActiveSession(activeSession);
  document.getElementById('intensityModal').classList.remove('active');
  pendingMenuDay = null;
  switchTab('record');
}

function buildExercises(parts) {
  const list      = [];
  const intensity = INTENSITY_TYPES[selectedIntensity];

  parts.forEach(part => {
    EXERCISES[part].slice(0, REC_EX_PER_PART_MIN).forEach(ex => {
      const prev     = getPrevData(ex.name, ex.bilateral);
      const r        = intensity.recReps;
      const bilateral = !!ex.bilateral;

      let w = '';
      if (prev) {
        const rm1  = Math.round(prev.weight / (1.0278 - 0.0278 * prev.reps));
        const calc = Math.round(rm1 * intensity.pct / 2.5) * 2.5;
        w = calc > 0 ? calc : prev.weight;
      }

      const makeSet = () => bilateral
        ? { id: Math.random().toString(36).slice(2), weightL: w, repsL: r, weightR: w, repsR: r, done: false }
        : { id: Math.random().toString(36).slice(2), weight: w, reps: r, done: false };

      list.push({
        id:        Math.random().toString(36).slice(2),
        name:      ex.name,
        part:      part,
        recReps:   r,
        intensity: selectedIntensity,
        bilateral,
        sets: [ makeSet(), makeSet() ]
      });
    });
  });
  return list;
}

function renderSetRow(exIdx, si, set, bilateral) {
  const doneClass = set.done ? 'done' : '';
  const rowClass  = set.done ? 'completed' : '';
  if (bilateral) {
    return `
      <div class="set-row ${rowClass}" id="setRow_${exIdx}_${si}" style="align-items:flex-start;padding:10px 8px;">
        <div class="set-num" style="margin-top:6px;">Set${si+1}</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:5px;">
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:12px;color:#e8ff00;font-weight:800;min-width:16px;">L</span>
            <input type="number" class="weight-input"
              id="wL_${exIdx}_${si}"
              value="${set.weightL || ''}" placeholder="kg" min="0" step="0.5"
              oninput="updateSetField(${exIdx},${si},'weightL',this.value)">
            <span class="x-sep">×</span>
            <input type="number" class="rep-input"
              id="rL_${exIdx}_${si}"
              value="${set.repsL || ''}" placeholder="rep" min="0"
              oninput="updateSetField(${exIdx},${si},'repsL',this.value)">
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:12px;color:#4fc3f7;font-weight:800;min-width:16px;">R</span>
            <input type="number" class="weight-input"
              id="wR_${exIdx}_${si}"
              value="${set.weightR || ''}" placeholder="kg" min="0" step="0.5"
              oninput="updateSetField(${exIdx},${si},'weightR',this.value)">
            <span class="x-sep">×</span>
            <input type="number" class="rep-input"
              id="rR_${exIdx}_${si}"
              value="${set.repsR || ''}" placeholder="rep" min="0"
              oninput="updateSetField(${exIdx},${si},'repsR',this.value)">
          </div>
        </div>
        <button class="set-done-btn ${doneClass}" id="doneBtn_${exIdx}_${si}"
          style="margin-top:4px;"
          onclick="toggleSetDone(${exIdx},${si})">✓</button>
      </div>`;
  }
  return `
    <div class="set-row ${rowClass}" id="setRow_${exIdx}_${si}">
      <div class="set-num">Set${si+1}</div>
      <input type="number" class="weight-input"
        id="w_${exIdx}_${si}"
        value="${set.weight || ''}" placeholder="kg" min="0" step="0.5"
        oninput="updateSetField(${exIdx},${si},'weight',this.value)">
      <span class="x-sep">×</span>
      <input type="number" class="rep-input"

}

function updateSetField(exIdx, si, field, val) {
  if (!activeSession) return;
  activeSession.exercises[exIdx].sets[si][field] = val;
  saveActiveSession(activeSession);
  updateLiveStats();
}

function toggleSetDone(exIdx, si) {
  if (!activeSession) return;
  const set = activeSession.exercises[exIdx].sets[si];
  set.done = !set.done;

  const row = document.getElementById('setRow_'   + exIdx + '_' + si);
  const btn = document.getElementById('doneBtn_'  + exIdx + '_' + si);

  if (set.done) {
    row.classList.add('completed');
    btn.classList.add('done');
    startTimer(activeSession.exercises[exIdx].name);
  } else {
    row.classList.remove('completed');
    btn.classList.remove('done');
  }

  saveActiveSession(activeSession);
  updateLiveStats();

  // re-render warnings
  const partCounts = calcLivePartSets();
  const warnings   = Object.keys(partCounts).filter(p => partCounts[p] > MAX_SETS_PER_PART);
  let warnEl = document.querySelector('.set-warnings');
  if (warnings.length > 0) {
    const warnHTML = '<div class="set-warnings">' +
      warnings.map(p => `<div class="set-warn-chip">⚠️ ${BODY_PARTS[p].label} ${partCounts[p]}セット超過</div>`).join('') +
      '</div>';
    if (warnEl) {
      warnEl.outerHTML = warnHTML;
    } else {
      document.querySelector('.volume-display').insertAdjacentHTML('afterend', warnHTML);
    }
  } else if (warnEl) {
    warnEl.remove();
  }
}

function addSet(exIdx) {
  if (!activeSession) return;
  const ex  = activeSession.exercises[exIdx];
  const si  = ex.sets.length;
  const newSet = ex.bilateral
    ? { id: Math.random().toString(36).slice(2), weightL: '', repsL: ex.recReps, weightR: '', repsR: ex.recReps, done: false }
    : { id: Math.random().toString(36).slice(2), weight: '', reps: ex.recReps, done: false };
  ex.sets.push(newSet);
  saveActiveSession(activeSession);
  document.getElementById('setsContainer_' + exIdx)
    .insertAdjacentHTML('beforeend', renderSetRow(exIdx, si, newSet, ex.bilateral));
  updateLiveStats();
}

function removeExercise(exIdx) {
  if (!activeSession) return;
  activeSession.exercises.splice(exIdx, 1);
  saveActiveSession(activeSession);
  renderRecord();
}

function setVolume(s, bilateral) {
  if (!s.done) return 0;
  if (bilateral) {
    let v = 0;
    if (s.weightL && s.repsL) v += parseFloat(s.weightL) * parseInt(s.repsL);
    if (s.weightR && s.repsR) v += parseFloat(s.weightR) * parseInt(s.repsR);
    return v;
  }
  return (s.weight && s.reps) ? parseFloat(s.weight) * parseInt(s.reps) : 0;
}

function calcLiveVolume() {
  if (!activeSession) return 0;
  let total = 0;
  activeSession.exercises.forEach(ex => {
    ex.sets.forEach(s => { total += setVolume(s, ex.bilateral); });
  });
  return Math.round(total);
}

function calcLiveDoneSets() {
  if (!activeSession) return 0;
  return activeSession.exercises.reduce((acc, ex) => acc + ex.sets.filter(s => s.done).length, 0);
}

function calcLivePartSets() {
  const counts = {};
  Object.keys(BODY_PARTS).forEach(p => counts[p] = 0);
  if (!activeSession) return counts;
  activeSession.exercises.forEach(ex => {
    if (counts[ex.part] !== undefined)
      counts[ex.part] += ex.sets.filter(s => s.done).length;
  });
  return counts;
}

function updateLiveStats() {
  const volEl  = document.getElementById('liveVolume');
  const setsEl = document.getElementById('liveSets');
  if (volEl)  volEl.textContent  = calcLiveVolume().toLocaleString();
  if (setsEl) setsEl.textContent = calcLiveDoneSets();
}

function completeWorkout() {
  if (!activeSession) return;
  if (calcLiveDoneSets() === 0) { showToast('完了セットがありません'); return; }

  // update PRs
  const prs = getPRs();
  activeSession.exercises.forEach(ex => {
    ex.sets.filter(s => s.done).forEach(s => {
      if (ex.bilateral) {
        if (s.weightL && s.repsL) {
          const vol = parseFloat(s.weightL) * parseInt(s.repsL);
          if (!prs[ex.name] || vol > prs[ex.name].volume) {
            prs[ex.name] = { weight: parseFloat(s.weightL), reps: parseInt(s.repsL), volume: vol, date: activeSession.date };
          }
        }
      } else if (s.weight && s.reps) {
        const vol = parseFloat(s.weight) * parseInt(s.reps);
        if (!prs[ex.name] || vol > prs[ex.name].volume) {
          prs[ex.name] = { weight: parseFloat(s.weight), reps: parseInt(s.reps), volume: vol, date: activeSession.date };
        }
      }
    });
  });
  savePRs(prs);

  // save history
  const history = getHistory();
  history.push({ ...activeSession, endTime: Date.now() });
  saveHistory(history);

  // clear
  activeSession = null;
  saveActiveSession(null);

  showToast('✓ ワークアウトを記録しました！');
  switchTab('analysis');
}

function abandonSession() {
  if (!confirm('ワークアウトを中断しますか？')) return;
  activeSession = null;
  saveActiveSession(null);
  renderRecord();
}

function addExToSession(name, part, rec, bilateral) {
  if (!activeSession) {
    activeSession = {
      id: Date.now().toString(),
      name: 'カスタムワークアウト',
      date: todayStr(),
      startTime: Date.now(),
      exercises: []
    };
  }
  const prevAdd = getPrevData(name, bilateral);
  const wAdd    = prevAdd ? prevAdd.weight : '';
  const rAdd    = prevAdd ? prevAdd.reps   : rec;
  const makeSet = () => bilateral
    ? { id: Math.random().toString(36).slice(2), weightL: wAdd, repsL: rAdd, weightR: wAdd, repsR: rAdd, done: false }
    : { id: Math.random().toString(36).slice(2), weight: wAdd, reps: rAdd, done: false };
  activeSession.exercises.push({
    id:      Math.random().toString(36).slice(2),
    name, part,
    recReps: rec,
    bilateral: !!bilateral,
    sets: [ makeSet(), makeSet() ]
  });
  saveActiveSession(activeSession);
  document.getElementById('addExModal').classList.remove('active');
  renderRecord();
}

// ============================================================
//  TIMER
// ============================================================

function startTimer(exName) {
  stopTimer();

  // 強度に応じてインターバル時間を自動設定
  if (activeSession && activeSession.intensity) {
    const t = INTENSITY_TYPES[activeSession.intensity];
    timerState.duration  = t.intervalSec;
  }

  timerState.exName     = exName;
  timerState.remaining  = timerState.duration;
  timerState.active     = true;
  timerState.paused     = false;

  // タイマーボタンのラベルと選択状態も強度に合わせて更新
  updateTimerButtons();

  document.getElementById('timerExName').textContent = exName;
  document.getElementById('timerPauseBtn').textContent = '一時停止';
  updateTimerDisplay();
  document.getElementById('timerOverlay').classList.add('active');

  timerState.interval = setInterval(() => {
    if (!timerState.paused) {
      timerState.remaining--;
      updateTimerDisplay();
      if (timerState.remaining <= 0) timerComplete();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const r    = Math.max(0, timerState.remaining);
  const mins = Math.floor(r / 60);
  const secs = r % 60;
  document.getElementById('timerSeconds').textContent = `${mins}:${pad2(secs)}`;

  const progress = r / timerState.duration;
  const offset   = TIMER_CIRCUMFERENCE * (1 - progress);
  document.getElementById('timerRingFg').style.strokeDashoffset = offset;
}

function timerComplete() {
  stopTimer();
  document.getElementById('timerOverlay').classList.remove('active');
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);
  showToast('⏱️ インターバル終了！次のセットへ');
}

function stopTimer() {
  if (timerState.interval) { clearInterval(timerState.interval); timerState.interval = null; }
  timerState.active = false;
  timerState.paused = false;
}

function skipTimer() {
  stopTimer();
  document.getElementById('timerOverlay').classList.remove('active');
}

function pauseTimer() {
  timerState.paused = !timerState.paused;
  document.getElementById('timerPauseBtn').textContent = timerState.paused ? '再開' : '一時停止';
}

function setTimerDuration(secs) {
  timerState.duration  = secs;
  timerState.remaining = secs;
  updateTimerDisplay();
  updateTimerButtons();
}

function updateTimerButtons() {
  // 強度に応じたボタンを動的に生成
  const wrap = document.querySelector('.timer-duration-btns');
  if (!wrap) return;

  let buttons = '';
  if (activeSession && activeSession.intensity) {
    const t = INTENSITY_TYPES[activeSession.intensity];
    // 推奨時間と±オプションを表示
    const opts = getTimerOptions(activeSession.intensity);
    buttons = opts.map(o =>
      `<button class="timer-dur-btn ${timerState.duration === o.sec ? 'active' : ''}"
        onclick="setTimerDuration(${o.sec})">${o.label}</button>`
    ).join('');
  } else {
    buttons = `
      <button class="timer-dur-btn ${timerState.duration===180?'active':''}" onclick="setTimerDuration(180)">3分</button>
      <button class="timer-dur-btn ${timerState.duration===240?'active':''}" onclick="setTimerDuration(240)">4分</button>`;
  }
  wrap.innerHTML = buttons;
}

function getTimerOptions(intensity) {
  if (intensity === 'light')  return [
    { sec: 60,  label: '1分' },
    { sec: 90,  label: '90秒 ★' },
    { sec: 120, label: '2分' }
  ];
  if (intensity === 'medium') return [
    { sec: 120, label: '2分' },
    { sec: 180, label: '3分 ★' },
    { sec: 240, label: '4分' }
  ];
  if (intensity === 'heavy')  return [
    { sec: 180, label: '3分' },
    { sec: 240, label: '4分' },
    { sec: 300, label: '5分 ★' }
  ];
  return [
    { sec: 180, label: '3分' },
    { sec: 240, label: '4分' }
  ];
}

let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-indexed

function renderCalendar() {
  const gymDays   = getGymDays();
  const history   = getHistory();
  const trainedSet = new Set(history.map(s => s.date));
  const today     = todayStr();

  const year  = calYear;
  const month = calMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthLabel = `${year}年${month + 1}月`;

  // 今月のジム予定日数
  const monthPrefix = `${year}-${pad2(month+1)}`;
  const gymCount    = gymDays.filter(d => d.startsWith(monthPrefix)).length;

  let dayCells = '';
  for (let i = 0; i < firstDay; i++) {
    dayCells += `<div class="cal-day empty"></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${pad2(month+1)}-${pad2(d)}`;
    const isToday = dateStr === today;
    const isGym   = gymDays.includes(dateStr);   // ジムに行ける日
    const isTrain = trainedSet.has(dateStr);      // 実際に記録した日
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (isGym)   cls += ' rest';    // 緑ではなく黄色系で「ジム日」として表示
    if (isTrain) cls += ' trained'; // 実際にやった日は緑
    dayCells += `<div class="${cls}" onclick="onCalDayClick('${dateStr}')">${d}</div>`;
  }

  const advice  = getVolumeAdvice();
  const recSets = getRecommendedSetsForWeek();

  document.getElementById('cal-month-label').textContent = monthLabel;
  document.getElementById('cal-days').innerHTML = dayCells;
  document.getElementById('cal-train-count').textContent = `今月のジム予定：${gymCount}日登録済み`;
  document.getElementById('advice-text').textContent = advice;
  document.getElementById('rec-sets-text').textContent = `今週の推奨セット数：各部位 ${recSets}セット`;
}

function onCalDayClick(dateStr) {
  toggleGymDay(dateStr);
  renderCalendar();
  renderHome();
}

function calPrevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}
function calNextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderAnalysis() {
  const el      = document.getElementById('screen-analysis');
  const history = getHistory();
  const weekly  = getWeeklySetsPerPart();
  const prs     = getPRs();

  // weekly frequency
  const freqMap = {};
  Object.keys(BODY_PARTS).forEach(p => freqMap[p] = 0);
  history.forEach(s => {
    if (!isThisWeek(s.date)) return;
    [...new Set((s.exercises||[]).map(e => e.part))].forEach(p => {
      if (freqMap[p] !== undefined) freqMap[p]++;
    });
  });

  const freqHTML = Object.keys(BODY_PARTS).map(p => {
    const cnt = freqMap[p];
    const pct = Math.min(100, (cnt / 3) * 100);
    return `
      <div class="freq-bar-row">
        <div class="freq-label">
          <span>${BODY_PARTS[p].label}</span>
          <span>${cnt}回 ／ 推奨3回</span>
        </div>
        <div class="freq-bar-track">
          <div class="freq-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>`;
  }).join('');

  // PRs
  const prEntries = Object.entries(prs);
  let prHTML = '';
  if (prEntries.length === 0) {
    prHTML = '<div class="empty-state"><div class="es-icon">🏆</div><div>まだPRがありません</div></div>';
  } else {
    prHTML = prEntries.slice(-20).reverse().map(([name, pr]) =>
      `<div class="pr-item">
        <div>
          <div class="pr-name">${name}</div>

        </div>
        <div class="pr-val">${pr.weight}kg × ${pr.reps}</div>

  }

  // recent sessions
  const recent10 = history.slice(-10).reverse();
  let sessHTML = '';
  if (recent10.length === 0) {
    sessHTML = '<div class="empty-state"><div class="es-icon">📋</div><div>まだ記録がありません</div></div>';
  } else {
    sessHTML = recent10.map(s => {
      const vol   = calcSessionVolume(s);
      const parts = [...new Set((s.exercises||[]).map(e => BODY_PARTS[e.part]?.label).filter(Boolean))].join('・');
      const sets  = (s.exercises||[]).reduce((acc, ex) => acc + ex.sets.filter(st => st.done).length, 0);
      return `
        <div class="session-hist-item">
          <div class="sh-date">${formatDateJP(s.date)}</div>
          <div class="sh-title">${s.name}</div>
          <div class="sh-meta">${parts} ／ ${sets}セット ／ ${vol.toLocaleString()}kg</div>
        </div>`;
    }).join('');
  }

  el.innerHTML = `
    <div class="page-header">
      <div class="date-str">分析</div>
    </div>

    <div class="card">
      <div class="card-title">📅 ジムに行ける日カレンダー</div>
      <div style="font-size:12px;color:#888;margin-bottom:10px;">休みの日（ジムに行ける日）をタップして登録してください</div>
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="calPrevMonth()">‹</button>
        <div class="cal-month-label" id="cal-month-label"></div>
        <button class="cal-nav-btn" onclick="calNextMonth()">›</button>
      </div>
      <div class="cal-grid">
        <div class="cal-day-label">日</div>
        <div class="cal-day-label">月</div>
        <div class="cal-day-label">火</div>
        <div class="cal-day-label">水</div>
        <div class="cal-day-label">木</div>
        <div class="cal-day-label">金</div>
        <div class="cal-day-label">土</div>
        <div id="cal-days" style="display:contents;"></div>
      </div>
      <div class="cal-legend">
        <span><span class="legend-dot" style="background:#ff6b6b;"></span>ジム予定日</span>
        <span><span class="legend-dot" style="background:#4caf50;"></span>トレーニング済</span>
        <span><span class="legend-dot" style="border:1.5px solid #e8ff00;"></span>今日</span>
      </div>
      <div style="margin-top:10px;font-size:13px;color:#888;" id="cal-train-count"></div>
    </div>

    <div class="advice-box">
      <div class="advice-title">💡 今週のアドバイス</div>
      <div id="advice-text"></div>
      <div style="margin-top:6px;font-size:13px;color:#e8ff00;" id="rec-sets-text"></div>
    </div>

    <div class="card">
      <div class="card-title">今週のセット数（部位別）</div>
      <div class="chart-wrap">
        <canvas id="weeklyChart"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">今週のトレーニング頻度</div>

      <div class="card-title">セッション履歴（直近10件）</div>
      ${sessHTML}
    </div>`;

  requestAnimationFrame(() => {
    drawWeeklyChart(weekly);
    renderCalendar();
  });
}

function drawWeeklyChart(counts) {
  const canvas = document.getElementById('weeklyChart');
  if (!canvas) return;

  const W = canvas.parentElement.clientWidth;
  const H = 200;
  canvas.width  = W;
  canvas.height = H;

  const ctx  = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const parts  = Object.keys(BODY_PARTS);
  const n      = parts.length;
  const padL   = 36, padR = 8, padT = 20, padB = 36;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const maxVal = 10;
  const barW   = (chartW / n) * 0.52;
  const spacing = chartW / n;

  // grid lines + y-axis labels
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth   = 1;
  for (let i = 0; i <= maxVal; i += 2) {
    const y = padT + chartH * (1 - i / maxVal);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + chartW, y); ctx.stroke();
    ctx.fillStyle  = '#555';
    ctx.font       = '11px system-ui';
    ctx.textAlign  = 'right';
    ctx.fillText(i, padL - 4, y + 4);
  }

  // limit line at MAX_SETS_PER_PART
  const limitY = padT + chartH * (1 - MAX_SETS_PER_PART / maxVal);
  ctx.strokeStyle = '#ff444466';
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(padL, limitY); ctx.lineTo(padL + chartW, limitY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#ff4444';
  ctx.font      = 'bold 10px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('上限6', padL + 2, limitY - 4);

  // bars
  parts.forEach((part, i) => {
    const val   = Math.min(counts[part], maxVal);
    const x     = padL + i * spacing + (spacing - barW) / 2;
    const barH2 = (val / maxVal) * chartH;
    const y     = padT + chartH - barH2;
    const over  = counts[part] > MAX_SETS_PER_PART;

    ctx.fillStyle = over ? '#ff4444cc' : (counts[part] > 0 ? '#e8ff00cc' : '#333');
    ctx.beginPath();
    if (ctx.roundRect) {
      ctx.roundRect(x, y, barW, Math.max(barH2, 2), [4, 4, 0, 0]);
    } else {
      ctx.rect(x, y, barW, Math.max(barH2, 2));
    }
    ctx.fill();

    // value
    if (counts[part] > 0) {
      ctx.fillStyle = over ? '#ff4444' : '#e8ff00';
      ctx.font      = 'bold 12px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(counts[part], x + barW / 2, y - 4);
    }

    // label
    ctx.fillStyle = '#888';
    ctx.font      = '11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(BODY_PARTS[part].label, x + barW / 2, H - padB + 16);
  });
}

// ============================================================

let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ============================================================
//  SERVICE WORKER
// ============================================================

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // 新しいSWが待機状態になったら更新バナーを表示
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });
    }).catch(() => {});

    // SWからの更新通知（SW_UPDATED メッセージ）を受け取ったらリロード
    navigator.serviceWorker.addEventListener('message', event => {
      if (event.data && event.data.type === 'SW_UPDATED') {
        // ワークアウト中でなければ自動リロード、実施中はバナー表示
        if (activeSession) {
          showUpdateBanner();
        } else {
          window.location.reload();
        }
      }
    });
  });
}

function showUpdateBanner() {
  if (document.getElementById('updateBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'updateBanner';
  banner.style.cssText = [
    'position:fixed', 'top:0', 'left:0', 'right:0', 'z-index:9999',
    'background:#e8ff00', 'color:#0f0f0f', 'text-align:center',
    'padding:12px 16px', 'font-size:14px', 'font-weight:700',
    'display:flex', 'align-items:center', 'justify-content:center', 'gap:12px'
  ].join(';');
  banner.innerHTML = `
    <span>🔄 アップデートあり！</span>
    <button onclick="window.location.reload()" style="background:#0f0f0f;color:#e8ff00;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;">
      今すぐ更新
    </button>
  `;
  document.body.prepend(banner);
}
